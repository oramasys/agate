# Agate example: 2-machine LAN (Mac orchestrator + Windows executor)
# Validates against: schemas/model_hardware_policy.schema.json

version: 1

metadata:
  owner: oramasys/diazMelgarejo
  last_updated: "2026-04-30"
  lan_topology:
    mac_endpoint: "http://192.168.1.110:1234/v1"
    windows_endpoint: "http://192.168.1.108:1234/v1"
    ollama_endpoint: "http://localhost:11434/v1"

models:
  Qwen3.5-9B-MLX-4bit:
    mac: PREFER
    windows: ALLOW
    shared: ALLOW
    context: 4096
    roles: [orchestrator, final-validator, presenter]
    notes: MLX-optimized; fast on Apple Silicon. Fits 8GB unified memory.

  Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2:
    mac: NEVER
    windows: PREFER
    shared: ALLOW
    context: 16384
    roles: [coder, checker, refiner, executor, verifier]
    notes: Too large for Mac unified memory. RTX 3080 24GB on Windows handles this.

  llama-3.2-3B:
    mac: PREFER
    windows: ALLOW
    shared: ALLOW
    context: 8192
    roles: [fallback, lightweight-ops]
    notes: Universal fallback for low-latency ops tasks.

  qwen3-coder:14b:
    mac: NEVER
    windows: NEVER
    shared: NEVER
    notes: Hallucinated model ID from v1 regression. Blocked everywhere as a safety measure.

routing:
  coding:default:     Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2
  coding:reliability: Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2
  coding:speed:       Qwen3.5-9B-MLX-4bit
  reasoning:default:  Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2
  reasoning:speed:    Qwen3.5-9B-MLX-4bit
  research:default:   Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2
  ops:default:        Qwen3.5-9B-MLX-4bit
  default:            Qwen3.5-9B-MLX-4bit
